name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    # Skip deploy if secrets are not configured
    # To enable deploy, set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY in repo secrets

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/max-hermes
            git fetch origin
            git checkout main
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart max-bridge
            sleep 3
            sudo systemctl status max-bridge --no-pager

      - name: Skip deploy (no secrets)
        if: ${{ secrets.DEPLOY_HOST == '' }}
        run: |
          echo "⚠️ Deploy skipped — DEPLOY_HOST secret not configured"
          echo "To enable auto-deploy, set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY in repo settings"
